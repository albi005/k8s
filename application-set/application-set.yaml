kind: ApplicationSet
apiVersion: argoproj.io/v1alpha1
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - merge:
        mergeKeys:
          - path.basename
        generators:
          - git:
              repoURL: https://github.com/albi005/k8s
              revision: HEAD
              directories:
                - path: "*"
          - git:
              repoURL: https://github.com/albi005/k8s
              revision: HEAD
              files:
                - path: "*/app-config.yaml"
  template:
    metadata:
      name: "{{.path.basename}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/albi005/k8s
        path: "{{.path.path}}"
      destination:
        name: in-cluster
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true

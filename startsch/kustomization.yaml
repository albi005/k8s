# TODO: Move StartSCH Kubernetes resource definitions into this repo

resources:
  # TODO: Replace `main` with a git commit hash and set up Renovate to update it automatically
  # https://github.com/renovatebot/renovate/discussions/17318
  - https://raw.githubusercontent.com/kir-dev/StartSCH/refs/heads/main/.config/kubernetes.yaml
  - ./service-monitor.yaml

patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: startsch-db
      namespace: startsch
    patch: |-
      - op: remove
        path: /spec/storage/storageClass
  - target:
      group: monitoring.coreos.com
      version: v1
      kind: PodMonitor
      name: startsch
      namespace: kube-prometheus-stack
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: monitoring
  - target:
      kind: PodMonitor
      name: startsch
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          release: kube-prom-stack
  - target:
      kind: Service
      name: startsch
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: startsch
        labels:
          release: kube-prom-stack
  - target:
      kind: Cluster
      name: startsch-db
    patch: |-
      - op: add
        path: /spec/plugins/0/enabled
        value: true
  - target:
      kind: ConfigMap
      name: startsch-config
    patch: |-
      - op: add
        path: /data/OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://opentelemetry-collector.monitoring.svc.cluster.local:4317

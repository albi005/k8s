apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: startsch
  namespace: monitoring
  labels:
    release: kube-prom-stack
spec:
  selector:
    matchLabels:
      release: kube-prom-stack
  namespaceSelector:
    matchNames:
      - startsch
  endpoints:
    - port: http
      path: /metrics

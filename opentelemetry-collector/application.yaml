apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.143.0
    helm:
      valuesObject:
        mode: deployment
        image:
          repository: otel/opentelemetry-collector-contrib
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          
          processors:
            batch: {}

          exporters:
            # 1. Traces -> Tempo
            otlp/tempo:
              endpoint: tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            
            # 2. Logs -> Loki
            otlphttp/loki:
              endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
              tls:
                insecure: true

            # 3. Metrics -> Prometheus (Remote Write is easiest)
            prometheusremotewrite:
              endpoint: http://kube-prom-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write

          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                processors: [batch]
                exporters: [prometheusremotewrite]
              logs:
                receivers: [otlp]
                processors: [batch]
                exporters: [otlphttp/loki]
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

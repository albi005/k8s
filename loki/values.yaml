# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/loki/main/production/helm/loki/values.schema.json
# schema is empty because why wouldn't it be

# based on
# https://github.com/grafana/loki/blob/main/production/helm/loki/single-binary-values.yaml

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  tracing:
    enabled: true
  querier:
    max_concurrent: 2

deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  resources:
    limits:
      cpu: 2
      memory: 2Gi
    requests:
      cpu: .1
      memory: 512Mi
  extraEnv:
    - name: GOMEMLIMIT
      value: 850MiB

chunksCache:
  writebackSizeLimit: 10MB

minio:
  enabled: true

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

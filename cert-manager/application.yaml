
# https://cert-manager.io/docs/installation/helm/#installing-from-the-oci-registry

kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: quay.io/jetstack/charts
    chart: cert-manager
    targetRevision: v1.19.2
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    name: in-cluster
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

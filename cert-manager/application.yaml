kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: quay.io/jetstack/charts/cert-manager
    chart: cert-manager
    targetRevision: v1.19.2
  destination:
    name: in-cluster
    namespace: cert-manager
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

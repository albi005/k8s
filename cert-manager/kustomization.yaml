namespace: cert-manager
resources:
  - namespace.yaml
helmCharts:
  - name: cert-manager
    repo: oci://quay.io/jetstack/charts
    version: v1.19.2
    releaseName: cert-manager
    namespace: cert-manager
    valuesInline:
      crds:
        enabled: true
      global:
        leaderElection:
          namespace: cert-manager

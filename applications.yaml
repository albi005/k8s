kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: applications
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/albi005/k8s
    path: applications.yaml
  destination:
    name: in-cluster

---

kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/albi005/k8s
    path: argocd
  destination:
    name: in-cluster
